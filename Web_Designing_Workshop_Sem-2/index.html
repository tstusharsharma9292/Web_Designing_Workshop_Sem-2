<!DOCTYPE html>
<html>
<head>
    <title>Flappy Bird (Static)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game">

        <div class="bird">
            <img src="bird.svg" alt="bird" style="margin: 0;">
        </div>

        <div class="pipe">
            <div class="top" style="height: 35vh;"></div>
            <div class="gap"></div>
            <div class="bottom" style="height: 30vh;"></div>
        </div>

        <div class="pipe">
            <div class="top" style="height: 20vh;"></div>
            <div class="gap"></div>
            <div class="bottom" style="height: 45vh;"></div>
        </div>

       
        <div class="pipe">
            <div class="top" style="height: 55vh;"></div>
            <div class="gap"></div>
            <div class="bottom" style="height: 10vh;"></div>
        </div>

        <div class="pipe">
            <div class="top" style="height: 40vh;"></div>
            <div class="gap"></div>
            <div class="bottom" style="height: 25vh;"></div>
        </div>

        <div class="pipe">
            <div class="top" style="height: 24vh;"></div>
            <div class="gap"></div>
            <div class="bottom" style="height: 41vh;"></div>
        </div>

        

    </div>

</body>
</html>
