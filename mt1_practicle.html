<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Interest Calculator</title>
    <link rel="stylesheet" href="./stylemt1_practicel.css">
</head>
<body>
    <div class="card">
        <h3>S.I. Calculator</h3>
        <div class="input-group">
            <label>Principal (P)</label>
            <input type="number" id="p" placeholder="e.g. 1000">
        </div>
        <div class="input-group">
            <label>Rate of Interest (R%)</label>
            <input type="number" id="r" placeholder="e.g. 5">
        </div>
        <div class="input-group">
            <label>Time (Years)</label>
            <input type="number" id="t" placeholder="e.g. 2">
        </div>
        <button onclick="calcSI()">Calculate Interest</button>
        <div id="result"></div>
    </div>
    <script src="./mt1practicle.js"></script>
</body>
</html>
